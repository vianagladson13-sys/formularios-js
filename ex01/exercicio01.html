<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Exercício 01</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #eef2f7;
        }

        .sidebar,
        .offcanvas {
            background-color: #111827;
        }

        .sidebar .nav-link,
        .offcanvas .nav-link {
            color: #d1d5db;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 8px;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active,
        .offcanvas .nav-link:hover,
        .offcanvas .nav-link.active {
            background-color: #2563eb;
            color: #fff;
        }

        .card-form {
            max-width: 900px;
            border: 0;
            border-radius: 22px;
        }

        .form-control,
        .form-select {
            border-radius: 12px;
        }

        .btn {
            border-radius: 12px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR MOBILE -->
    <nav class="navbar navbar-light bg-white shadow-sm d-lg-none">
        <div class="container-fluid">
            <button class="btn btn-dark" data-bs-toggle="offcanvas" data-bs-target="#menuLateral">
                <i class="bi bi-list fs-4"></i>
            </button>

            <span class="navbar-brand fw-bold mb-0">
                Cadastro
            </span>
        </div>
    </nav>

    <!-- MENU MOBILE -->
    <div class="offcanvas offcanvas-start text-white" tabindex="-1" id="menuLateral">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title">
                <i class="bi bi-grid"></i> Menu
            </h5>
            <button class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body">
            <nav class="nav flex-column">
                <a class="nav-link active" href="#"><i class="bi bi-house me-2"></i> Exercício 1</a>
                <a class="nav-link" href="#"><i class="bi bi-pencil-square me-2"></i> Exercício 2</a>
                <a class="nav-link" href="#"><i class="bi bi-people me-2"></i> Exercício 3</a>
                <a class="nav-link" href="#"><i class="bi bi-card-checklist me-2"></i> Exercício 4</a>
                <a class="nav-link" href="#"><i class="bi bi-bar-chart me-2"></i> Exercício 5</a>
                <a class="nav-link" href="#"><i class="bi bi-calendar me-2"></i> Exercício 6</a>
                <a class="nav-link" href="#"><i class="bi bi-gear me-2"></i> Exercício 7</a>
                <a class="nav-link" href="#"><i class="bi bi-star me-2"></i> Exercício 8</a>
            </nav>
        </div>
    </div>

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR DESKTOP -->
            <aside class="col-lg-3 col-xl-2 sidebar text-white min-vh-100 p-4 d-none d-lg-block">

                <h4 class="fw-bold mb-4">
                    <i class="bi bi-mortarboard"></i> Exercícios
                </h4>

                <nav class="nav flex-column">
                    <a class="nav-link" href="./../index.html"><i class="bi bi-house me-2"></i> Home</a>
                    <a class="nav-link active" href="#"><i class="bi bi-house me-2"></i> Exercício 1</a>
                    <a class="nav-link" href="#"><i class="bi bi-pencil-square me-2"></i> Exercício 2</a>
                    <a class="nav-link" href="#"><i class="bi bi-people me-2"></i> Exercício 3</a>
                    <a class="nav-link" href="#"><i class="bi bi-card-checklist me-2"></i> Exercício 4</a>
                    <a class="nav-link" href="#"><i class="bi bi-bar-chart me-2"></i> Exercício 5</a>
                    <a class="nav-link" href="#"><i class="bi bi-calendar me-2"></i> Exercício 6</a>
                    <a class="nav-link" href="#"><i class="bi bi-gear me-2"></i> Exercício 7</a>
                    <a class="nav-link" href="#"><i class="bi bi-star me-2"></i> Exercício 8</a>
                </nav>

                <hr class="text-secondary">

                <a class="nav-link" href="index.html">
                    <i class="bi bi-box-arrow-right me-2"></i> Sair
                </a>

            </aside>

            <!-- CONTEÚDO -->
            <main class="col-lg-9 col-xl-10 p-4 p-lg-5">

                <div class="card card-form shadow-sm mx-auto">

                    <div class="card-body p-4 p-lg-5">

                        <div class="d-flex align-items-center mb-4">
                            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3"
                                style="width: 55px; height: 55px;">
                                <i class="bi bi-person-plus fs-3"></i>
                            </div>

                            <div>
                                <h1 class="h4 mb-1">Exercicio 01</h1>
                                <p class="text-muted mb-0">Preencha os dados abaixo para realizar o cadastro.</p>
                            </div>
                        </div>

                        <form id="formEx01">

                            <div class="row">
                                <div class="col-md-8 mb-3">
                                    <label for="nome" class="form-label">Nome completo</label>
                                    <input type="text" class="form-control" id="nome" placeholder="Ex: João da Silva">                                  
                                </div>

                                <div class="col-md-4 mb-3">
                                    <label for="cpf" class="form-label">CPF</label>
                                    <input type="text" class="form-control" id="cpf" placeholder="123.456.789-00">                                  
                                </div>
                            </div>                          

                            <div class="d-grid gap-2 d-md-flex">
                                <button type="submit" class="btn btn-primary flex-fill">
                                    <i class="bi bi-check-circle"></i> Salvar
                                </button>

                                <button type="reset" class="btn btn-light border flex-fill">
                                    <i class="bi bi-arrow-clockwise"></i> Limpar
                                </button>
                            </div>

                        </form>

                    </div>
                </div>

            </main>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./script.js"></script>

</body>

</html>
